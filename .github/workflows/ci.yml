# ── .github/workflows/ci.yml ─────────────────────────────────────────────────
# PaperLens CI Pipeline
# Triggers on every push and pull request to main
# Runs: lint → tests → docker build check

name: PaperLens CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── JOB 1: Tests ──────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"               # Cache pip deps for faster runs

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Create mock data files for tests
        run: |
          mkdir -p data
          python - <<'EOF'
          import sqlite3, json, numpy as np

          # Create minimal mock papers.db
          conn = sqlite3.connect("data/papers.db")
          conn.execute("""
            CREATE TABLE IF NOT EXISTS papers (
              id TEXT PRIMARY KEY,
              title TEXT,
              abstract TEXT,
              authors TEXT,
              year INTEGER,
              url TEXT,
              category TEXT,
              source TEXT
            )
          """)
          conn.execute("""
            INSERT OR IGNORE INTO papers VALUES (
              'test_paper_001',
              'Attention Is All You Need',
              'We propose the Transformer architecture based on attention.',
              'Vaswani et al.',
              2017,
              'https://arxiv.org/abs/1706.03762',
              'cs.AI',
              'arxiv'
            )
          """)
          conn.commit()
          conn.close()

          # Create minimal mock embeddings + FAISS index
          import faiss
          d = 384
          embeddings = np.random.rand(1, d).astype("float32")
          np.save("data/embeddings.npy", embeddings)
          np.save("data/paper_ids.npy", np.array(["test_paper_001"]))

          index = faiss.IndexFlatL2(d)
          index.add(embeddings)
          faiss.write_index(index, "data/faiss_index.bin")

          with open("data/id_map.json", "w") as f:
            json.dump({"0": "test_paper_001"}, f)

          print("Mock data created successfully")
          EOF

      - name: Set dummy env vars for tests
        run: echo "GROQ_API_KEY=test_key_for_ci" >> $GITHUB_ENV

      - name: Run tests with coverage
        run: |
          pytest tests/test_api.py -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            -x                       # Stop on first failure

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false    # Don't break CI if codecov is down

  # ── JOB 2: Docker Build Check ─────────────────────────────────────────────

  # ── JOB 3: Lint ───────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check src/ --ignore E501   # Ignore line-length for now